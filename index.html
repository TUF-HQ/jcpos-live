function field(label,id,val){ return el('div',{class:'field'}, el('label',{},label), el('input',{id,type:'number',inputmode:'decimal',value:val||''})); }
function toPence(str){ if(str==null)return null; const n=parseFloat(str); return isNaN(n)?null:Math.round(n*100); }
function ymd(d){ return d.getFullYear()+'-'+d2(d.getMonth()+1)+'-'+d2(d.getDate()); }
function saveMoney(){
  const g=id=>{const e=$('#'+id);return e?e.value:undefined;};
  const bal=toPence(g('su-bal')), bud=toPence(g('su-bud')), tgt=toPence(g('su-tgt')), date=g('su-date');
  const s=Finance.settings();
  // everything (bank balance AND travel fund) flows from the start date: the starting balance is what you had then,
  // and income adds while fixed costs and spend subtract, so net worth tracks your cash flow
  const startDate = g('su-start') || s.travel_start_date || ymd(Finance.currentPeriod().start);
  Finance.saveSettings({
    starting_balance_pence: bal!=null?bal:s.starting_balance_pence,
    balance_anchored_at: startDate+'T00:00:00',
    monthly_budget_pence: bud!=null?bud:(s.monthly_budget_pence||0),
    travel_target_pence: tgt!=null?tgt:s.travel_target_pence,
    travel_target_date: date||s.travel_target_date||'2027-01-01',
    travel_start_date: startDate,
  });
  Finance.ensureRecurringPosted();
  toast('Saved'); App.render();
}
function addRecurring(kind){
  openSheet(kind==='income'?'Add income':'Add fixed cost', s=>{
    s.append(field2('Name','ar-name', kind==='income'?'Salary':''));
    s.append(field2('Amount (£)','ar-amt','','number'));
    const schedWrap=el('div',{class:'field'}, el('label',{},'When it lands'));
    const sched=el('select',{id:'ar-sched',class:'sel'},
      el('option',{value:'last_working_day'},'Last working day of the month'),
      el('option',{value:'fixed'},'A set day of the month'));
    schedWrap.append(sched); s.append(schedWrap);
    const dayWrap=el('div',{class:'field',id:'ar-daywrap'}, el('label',{},'Day of month'),
      el('input',{id:'ar-day',type:'number',inputmode:'numeric',value:'1'}));
    s.append(dayWrap);
    sched.value = kind==='income' ? 'last_working_day' : 'fixed';
    const sync=()=>{ dayWrap.style.display = sched.value==='fixed' ? '' : 'none'; };
    sched.addEventListener('change',sync); sync();
    s.append(el('button',{class:'btn acc',onclick:()=>{
      const name=$('#ar-name').value.trim(), amt=toPence($('#ar-amt').value);
      const rule=$('#ar-sched').value, day=parseInt($('#ar-day').value)||1;
      if(!name||!amt){toast('Add a name and amount');return;}
      Store.upsert('recurring_items',{id:uid(),kind,label:name,amount_pence:amt,
        day_rule:rule, day_of_month:rule==='fixed'?Math.min(28,Math.max(1,day)):null, active:true});
      Finance.ensureRecurringPosted(); closeSheet(); toast('Added'); App.render();
    }},'Add'));
  });
}
function field2(label,id,val,type){ return el('div',{class:'field'}, el('label',{},label), el('input',{id,type:type||'text',inputmode:type==='number'?'decimal':'text',value:val||''})); }
/* a date picker field for backdating an entry; returns the wrap plus the input so callers read input.value */
function dateField(label,def){ const input=el('input',{type:'date',value:def||ymd(new Date()),max:ymd(new Date())}); return {wrap:el('div',{class:'field'}, el('label',{},label||'Date'), input), input}; }

/* ---- FAST LOGGER (the make or break screen) ---- */
let logState={cat:null,pence:0};
function openLogger(){
  if(!Finance.cats().length){ toast('Add categories in Setup'); return; }
  logState={cat:Finance.cats()[0].id,pence:0,date:ymd(new Date())};
  openSheet('Log a spend', s=>{
    const cats=el('div',{class:'cats'});
    Finance.cats().forEach(c=>{
      const b=el('button',{class:'cat'+(c.id===logState.cat?' sel':'')},
        el('span',{class:'ico'},c.icon),el('span',{class:'nm'},c.name));
      b.addEventListener('click',()=>{ logState.cat=c.id; $$('.cat',s).forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); });
      cats.append(b);
    });
    s.append(cats);
    const amt=el('div',{class:'amount zero tnum'},'£0.00'); s.append(amt);
    const chips=el('div',{class:'chips'});
    [500,1000,2000,5000].forEach(p=>chips.append(el('button',{class:'chip',onclick:()=>{logState.pence=p;paintAmt(amt);}},fmtP0(p))));
    s.append(chips);
    const note=el('div',{class:'notewrap'},el('input',{id:'log-note',placeholder:'Note (optional)',type:'text'})); s.append(note);
    const dwrap=dateField('Date', logState.date); dwrap.input.addEventListener('change',()=>{logState.date=dwrap.input.value;}); s.append(dwrap.wrap);
    const pad=el('div',{class:'keypad'});
    ['1','2','3','4','5','6','7','8','9','C','0','⌫'].forEach(k=>{
      pad.append(el('button',{class:'key',onclick:()=>{ press(k); paintAmt(amt); }},k));
    });
    s.append(pad);
    s.append(el('button',{class:'btn acc',style:'margin-top:14px',onclick:saveLog},'Save spend'));
  });
}
function press(k){
  if(k==='C'){ logState.pence=0; return; }
  if(k==='⌫'){ logState.pence=Math.floor(logState.pence/10); return; }
  const d=parseInt(k); if(isNaN(d))return;
  if(logState.pence>=10000000) return; // cap at £100k
  logState.pence=logState.pence*10+d;
}
function paintAmt(node){ node.textContent=fmtP(logState.pence); node.classList.toggle('zero',logState.pence===0); }
function saveLog(){
  if(logState.pence<=0){ toast('Enter an amount'); return; }
  if(!logState.cat){ toast('Pick a category'); return; }
  const note=$('#log-note')?$('#log-note').value.trim():'';
  const occ = logState.date ? new Date(logState.date+'T12:00:00').toISOString() : nowISO();
  Finance.logSpend(logState.cat,logState.pence,note,occ);
  closeSheet(); toast('Logged '+fmtP(logState.pence)); App.render();
}

/* ---- sheet + toast primitives ---- */
function openSheet(title,build){
  closeSheet();
  const scrim=el('div',{class:'scrim',onclick:e=>{if(e.target===scrim)closeSheet();}});
  const sheet=el('div',{class:'sheet'}, el('h2',{},title));
  build(sheet); scrim.append(sheet); $('#scrim-root').append(scrim);
}
function closeSheet(){ $('#scrim-root').innerHTML=''; }
let toastT;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

/* =========================================================================
   BOOT
   ========================================================================= */
async function showApp(){
  $('#auth').classList.add('hide'); $('#app').classList.remove('hide'); $('#nav').classList.remove('hide');
  // pull existing cloud data BEFORE rendering or seeding, so we never show an empty app
  // (which made you re-enter) and never seed duplicate categories on top of synced ones
  if(Auth.userId){
    Sync.setStatus('syncing');
    $('#view').innerHTML='<div class="muted center" style="padding:64px 0">Loading your data...</div>';
    try{ await Auth.backfillAndSync(); }catch(e){}
  } else {
    Sync.setStatus('local');
  }
  Finance.seedCats();
  Finance.ensureRecurringPosted();
  App.render();
}
function showAuth(){
  $('#app').classList.add('hide'); $('#nav').classList.add('hide'); $('#auth').classList.remove('hide');
  $('#au-note').textContent = Sync.sb? '' : 'No cloud keys set yet. You can use the app offline now and add sync later.';
  $('#au-login').classList.toggle('hide',!Sync.sb);
  $('#au-signup').classList.toggle('hide',!Sync.sb);
}
async function boot(){
  Store.load();
  Sync.init();
  Store.onChange(()=>{ /* re-render current view on any data change */ if(!$('#app').classList.contains('hide')) App.render(); });

  // nav
  $$('#nav button[data-nav]').forEach(b=>b.addEventListener('click',()=>App.go(b.dataset.nav)));

  // auth handlers
  $('#au-login').addEventListener('click',async()=>{ try{ await Auth.signIn($('#au-email').value.trim(),$('#au-pass').value); await showApp(); }catch(e){ $('#au-err').textContent=e.message; } });
  $('#au-signup').addEventListener('click',async()=>{ try{ await Auth.signUp($('#au-email').value.trim(),$('#au-pass').value); $('#au-err').textContent='Account created. Now sign in.'; }catch(e){ $('#au-err').textContent=e.message; } });
  $('#au-offline').addEventListener('click',()=>{ LS.set('jcpos.offline',true); Auth.userId=null; showApp(); });

  const ok=await Auth.init();
  if(ok){ await showApp(); } else { showAuth(); }

  // register service worker for installable PWA / offline shell
  if('serviceWorker' in navigator){ try{ await navigator.serviceWorker.register('JCPOS_sw.js'); }catch(e){} }
}
boot();
</script>
